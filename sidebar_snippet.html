<!-- Sidebar Logic & Interaction -->
<script id="sidebar-core-logic">
    (function () {
        const sidebar = document.querySelector('aside.dashboard-sidebar');
        if (!sidebar) return;
        
        const toggleBtn = document.querySelector('.side-bar-toggle');
        const headerInner = document.querySelector('.header-inner');
        const headerArea = document.querySelector('.sidebar-header-area');
        const logoText = document.querySelector('.logo-text');
        const logoImg = document.querySelector('.sidebar-logo-img');
        const navLinks = document.querySelectorAll('.nav-link-btn');
        const dividerLine = document.querySelector('.sidebar-divider-line');
        const logoutBtn = document.querySelector('.logout-btn');
        const sidebarNav = sidebar.querySelector('nav');

        // Set Active State based on current URL
        const currentPath = window.location.pathname.split('/').pop() || 'dashboard_overview.html';
        navLinks.forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.add('active-nav-item', 'text-electric-blue', 'neon-text-blue');
                link.classList.remove('text-slate-400');
                const icon = link.querySelector('.nav-icon');
                if (icon) icon.classList.add('text-electric-blue', 'neon-text-blue');
            }
        });

        // Toggle functionality
        if (toggleBtn) {
            toggleBtn.addEventListener('click', () => {
                const isExpanded = !sidebar.classList.contains('w-72');
                localStorage.setItem('sidebarExpanded', isExpanded);
                applySidebarState(isExpanded);
            });
        }

        function applySidebarState(expanded) {
            if (expanded) {
                sidebar.classList.remove('w-20', 'items-center');
                sidebar.classList.add('w-72');
                if (logoText) {
                    logoText.classList.remove('hidden', 'opacity-0');
                    logoText.classList.add('opacity-100', 'pl-12');
                    logoText.textContent = "ALCONIO";
                }
                if (logoImg) {
                    logoImg.classList.remove('left-1/2', '-translate-x-1/2');
                    logoImg.classList.add('left-4');
                }
                const icon = toggleBtn?.querySelector('.toggle-icon');
                if (icon) icon.textContent = 'keyboard_tab_rtl';
                
                headerArea?.classList.replace('px-0', 'px-6');
                headerArea?.classList.replace('justify-end', 'justify-between');
                headerInner?.classList.replace('justify-center', 'justify-between');
                sidebarNav?.classList.replace('items-center', 'items-stretch');
                
                if (dividerLine) dividerLine.style.left = '18rem';

                navLinks.forEach(link => {
                    link.classList.remove('w-12', 'h-12', 'justify-center');
                    link.classList.add('w-full', 'h-12', 'justify-start', 'pl-5');
                    const label = link.querySelector('.md-label');
                    if (label) { label.classList.remove('hidden'); label.classList.add('inline'); }
                });

                if (logoutBtn) {
                    logoutBtn.classList.remove('w-12');
                    logoutBtn.classList.add('w-full', 'justify-start', 'pl-5');
                    const label = logoutBtn.querySelector('.md-label');
                    if (label) { label.classList.remove('hidden'); label.classList.add('inline'); }
                }
            } else {
                sidebar.classList.remove('w-72');
                sidebar.classList.add('w-20', 'items-center');
                if (logoText) {
                    logoText.classList.remove('opacity-100', 'pl-12');
                    logoText.classList.add('hidden', 'opacity-0');
                }
                if (logoImg) {
                    logoImg.classList.remove('left-4');
                    logoImg.classList.add('left-1/2', '-translate-x-1/2');
                }
                const icon = toggleBtn?.querySelector('.toggle-icon');
                if (icon) icon.textContent = 'start';

                headerArea?.classList.replace('px-6', 'px-0');
                headerArea?.classList.replace('justify-between', 'justify-end');
                headerInner?.classList.replace('justify-between', 'justify-center');
                sidebarNav?.classList.replace('items-stretch', 'items-center');
                
                if (dividerLine) dividerLine.style.left = '5rem';

                navLinks.forEach(link => {
                    link.classList.add('w-12', 'h-12', 'justify-center');
                    link.classList.remove('w-full', 'justify-start', 'pl-5');
                    const label = link.querySelector('.md-label');
                    if (label) { label.classList.add('hidden'); label.classList.remove('inline'); }
                });

                if (logoutBtn) {
                    logoutBtn.classList.add('w-12', 'justify-center');
                    logoutBtn.classList.remove('w-full', 'pl-5');
                    const label = logoutBtn.querySelector('.md-label');
                    if (label) { label.classList.add('hidden'); label.classList.remove('inline'); }
                }
            }
        }

        // Initial State
        const isExpanded = localStorage.getItem('sidebarExpanded') !== 'false';
        
        // Anti-FOUC (Kill transitions for first load)
        const transitionEls = [sidebar, headerArea, headerInner, sidebarNav, dividerLine, toggleBtn, logoText, logoImg, ...navLinks, logoutBtn].filter(Boolean);
        transitionEls.forEach(el => el.style.transition = 'none');
        
        applySidebarState(isExpanded);

        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                transitionEls.forEach(el => el.style.transition = '');
            });
        });
    })();
</script>
