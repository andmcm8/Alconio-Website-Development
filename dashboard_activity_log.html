    <!-- Strict Role-Based Access Control (RBAC) Guard -->
    <script>
        (function() {
            // 1. Instant concealment
            document.documentElement.style.display = 'none';

            // Constants
            const IS_ADMIN_PAGE = window.location.pathname.includes('dashboard_admin') || window.location.pathname.includes('dashboard_onboarding');
            const EXPECTED_ROLE = IS_ADMIN_PAGE ? 'admin' : 'client';

            function handleAuthFailure(reason) {
                console.error('[STRICT-AUTH] Redirecting due to:', reason);
                window.location.replace('dashboard_signin.html?reason=' + encodeURIComponent(reason));
            }

            function handleRoleMismatch(foundRole) {
                console.warn('[STRICT-AUTH] Role mismatch. Found:', foundRole, 'Expected:', EXPECTED_ROLE);
                const target = foundRole === 'admin' ? 'dashboard_admin.html' : 'dashboard_overview.html';
                window.location.replace(target);
            }

            async function verifyAccess() {
                try {
                    // 2. Wait for Clerk
                    if (typeof Clerk === 'undefined') {
                        let attempts = 0;
                        while (typeof Clerk === 'undefined' && attempts < 100) {
                            await new Promise(r => setTimeout(r, 50));
                            attempts++;
                        }
                    }

                    if (typeof Clerk === 'undefined') return handleAuthFailure('clerk_timeout');

                    // 3. Ensure loaded
                    if (!Clerk.loaded) await Clerk.load();

                    // 4. Verification logic
                    if (!Clerk.isSignedIn) {
                        return handleAuthFailure('not_signed_in');
                    }

                    const userRole = Clerk.user?.publicMetadata?.role;
                    
                    if (!userRole) {
                        return handleAuthFailure('no_role_assigned');
                    }

                    if (userRole !== EXPECTED_ROLE) {
                        return handleRoleMismatch(userRole);
                    }

                    // 5. Success - reveal page
                    document.documentElement.style.display = '';
                    console.log('[STRICT-AUTH] Access granted for role:', userRole);
                    
                    // Extra safety: call window.requireRole if it exists yet
                    if (typeof window.requireRole === 'function') {
                        window.requireRole(EXPECTED_ROLE);
                    }
                } catch (err) {
                    console.error('[STRICT-AUTH] Guard error:', err);
                    handleAuthFailure('guard_error');
                }
            }

            // Execute verification
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', verifyAccess);
            } else {
                verifyAccess();
            }
        })();
    </script>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // Wait for Clerk to be ready
    const checkClerk = setInterval(async () => {
        if (typeof window.Clerk !== 'undefined' && window.Clerk.loaded) {
            clearInterval(checkClerk);
            loadActivityLogs();
        }
    }, 100);

    async function loadActivityLogs() {
        const container = document.getElementById('dynamic-log-container');
        try {
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:';
            let token = isLocal ? "dev_token" : null;
            
            if (!isLocal && window.Clerk && window.Clerk.session) {
                token = await window.Clerk.session.getToken();
            }

            const apiUrl = isLocal ? 'http://localhost:3000/api/activity-logs' : 'https://arc-data-c40dcc24e2c8.herokuapp.com/api/activity-logs';
            
            const fetchOptions = token ? { headers: { 'Authorization': `Bearer ${token}` } } : {};
            const response = await fetch(apiUrl, fetchOptions);
            
            if (!response.ok) throw new Error('Failed to fetch logs');
            
            const logs = await response.json();
            
            if (logs.length === 0) {
                container.innerHTML = `<div class="text-center p-10 mt-10 text-slate-500 text-sm">No recent activity on your account.</div>`;
                return;
            }

            let html = '';
            let currentDate = '';

            logs.forEach(log => {
                const dateObj = new Date(log.created_at || Date.now());
                const dateStr = dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                const fullTime = dateObj.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                const [timeNum, ampm] = fullTime.split(' ');
                
                if (dateStr !== currentDate) {
                    if (currentDate !== '') html += `</div>`;
                    html += `
                    <div class="mb-8">
                        <h4 class="text-xs font-bold text-electric-blue uppercase tracking-widest mb-6 ml-10 flex items-center gap-2">
                            <span class="material-symbols-outlined text-sm">calendar_today</span> ${dateStr}
                        </h4>`;
                    currentDate = dateStr;
                }

                let nodeClass = 'info', iconColor = 'text-blue-400', bgClass = 'bg-blue-500/10', icon = 'info', tagColor = 'bg-blue-900/40 text-blue-400 border-blue-500/20';
                
                if (log.type === 'SUCCESS') { 
                    nodeClass = 'success'; iconColor = 'text-emerald-400'; bgClass = 'bg-emerald-500/10'; icon = 'check_circle'; tagColor = 'bg-emerald-900/40 text-emerald-400 border-emerald-500/20'; 
                } else if (log.type === 'WARNING') { 
                    nodeClass = 'warning'; iconColor = 'text-amber-400'; bgClass = 'bg-amber-500/10'; icon = 'warning'; tagColor = 'bg-amber-900/40 text-amber-400 border-amber-500/20'; 
                } else if (log.type === 'ERROR') { 
                    nodeClass = 'error'; iconColor = 'text-rose-400'; bgClass = 'bg-rose-500/10'; icon = 'receipt_long'; tagColor = 'bg-rose-900/40 text-rose-400 border-rose-500/20'; /* Using receipt_long icon for billing issues */
                } else if (log.type === 'SECURITY') { 
                    nodeClass = 'error'; iconColor = 'text-rose-400'; bgClass = 'bg-rose-500/10'; icon = 'security'; tagColor = 'bg-rose-900/40 text-rose-400 border-rose-500/20'; 
                } else if (log.type === 'CLIENT') {
                    nodeClass = 'info'; iconColor = 'text-indigo-400'; bgClass = 'bg-indigo-500/10'; icon = 'person_add'; tagColor = 'bg-indigo-900/40 text-indigo-400 border-indigo-500/20';
                }

                html += `
                <div class="relative pl-10 py-2 mb-4 group timeline-item">
                    <div class="timeline-node ${nodeClass}"></div>
                    <div class="glass-card rounded-xl p-4 md:p-5 flex flex-col md:flex-row md:items-center gap-4 hover:border-${iconColor.split('-')[1]}-500/30 transition-all cursor-pointer">
                        <div class="flex items-start md:items-center gap-4 flex-1">
                            <div class="flex flex-col min-w-[60px]">
                                <span class="text-xs font-mono text-white">${timeNum}</span>
                                <span class="text-[10px] text-slate-500">${ampm || ''}</span>
                            </div>
                            <div class="w-10 h-10 rounded-lg ${bgClass} border border-white/10 flex items-center justify-center shrink-0">
                                <span class="material-symbols-outlined ${iconColor}">${icon}</span>
                            </div>
                            <div class="flex flex-col">
                                <div class="flex items-center gap-2 mb-1">
                                    <h5 class="text-sm font-bold text-white group-hover:${iconColor} transition-colors">${log.title}</h5>
                                    <span class="px-2 py-0.5 rounded text-[9px] font-bold ${tagColor} border shadow-inner">${log.type}</span>
                                </div>
                                <p class="text-[13px] text-slate-300 pr-4">${log.message}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
            });
            
            if (logs.length > 0) html += `</div>`;
            container.innerHTML = html;
            
        } catch(err) {
            console.error(err);
            container.innerHTML = `<div class="text-center p-10 text-rose-500 text-sm">Failed to load activity logs: No connection to server</div>`;
        }
    }
});
</script>
